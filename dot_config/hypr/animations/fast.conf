# Fast — animaciones rápidas y snappy
animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.0
    bezier = winOut, 0.3, -0.3, 0, 1

    animation = windows, 1, 3, wind, slide
    animation = windowsIn, 1, 3, winIn, slide
    animation = windowsOut, 1, 2, winOut, slide
    animation = windowsMove, 1, 3, wind, slide
    animation = border, 1, 5, default
    animation = fade, 1, 3, wind
    animation = workspaces, 1, 3, wind, slide
}

# Minimal — animaciones sutiles, casi instantáneas
animations {
    enabled = yes
    bezier = linear, 0, 0, 1, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = windows, 1, 2, quick, popin 80%
    animation = windowsOut, 1, 2, quick, popin 80%
    animation = windowsMove, 1, 2, quick, slide
    animation = border, 1, 3, linear
    animation = fade, 1, 2, quick
    animation = workspaces, 1, 2, quick, fade
}

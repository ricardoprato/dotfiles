dwindle {
	preserve_split = true
	smart_split = false
	smart_resizing = false
}

decoration {
    rounding = 5

    blur {
        enabled = false
        xray = true
        special = false
        new_optimizations = true
        size = 14
        passes = 4
        brightness = 1
        noise = 0.01
        contrast = 1
        popups = true
        popups_ignorealpha = 0.6
    }

    # Shadow
    shadow {
        enabled = false
        ignore_window = true
        range = 20
        offset = 0 2
        render_power = 4
        color = rgba(0000002A)
    }

    # Window Opacities
    # active_opacity = 1
    # inactive_opacity = 1
    # fullscreen_opacity = 1
    
    # Shader
    # screen_shader = ~/.config/hypr/shaders/nothing.frag
    # screen_shader = ~/.config/hypr/shaders/vibrance.frag
    
    # Dim
    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0
}

animations {
    enabled = true

    # Bezier curves optimizadas
    bezier = linear, 0, 0, 1, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = smooth, 0.25, 0.1, 0.25, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = realsmooth, 0.28, 0.29, 0.69, 1.08

    # Windows
    animation = windows, 1, 3, md3_decel, popin 80%
    animation = windowsIn, 1, 3, md3_decel, popin 80%
    animation = windowsOut, 1, 2, md3_accel, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 3, smooth

    # Layers (rofi, waybar, etc)
    animation = layersIn, 1, 2, smooth, slide
    animation = layersOut, 1, 2, smoothOut, slide
    animation = fadeLayersIn, 1, 2, smooth
    animation = fadeLayersOut, 1, 2, smoothOut

    # Workspaces - fast and snappy
    animation = workspaces, 1, 3, md3_decel, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

misc {
    vfr = 1
    vrr = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    
    initial_workspace_tracking = false
}
layerrule = blur on, ignore_alpha 1, match:namespace waybar

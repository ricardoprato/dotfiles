
# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀█ █░█ █░░ █▀▀ █▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █▀▄ █▄█ █▄▄ ██▄ ▄█

# See https://wiki.hypr.land/Configuring/Window-Rules/
# Hyprland 0.53+ syntax: windowrule = match:<prop> <value>, <effect> <state>

# Dolphin dialogs
windowrule = match:class ^org\.kde\.dolphin$, match:title ^Progress Dialog — Dolphin$, float on
windowrule = match:class ^org\.kde\.dolphin$, match:title ^Copying — Dolphin$, float on

# Firefox
windowrule = match:title ^About Mozilla Firefox$, float on
windowrule = match:class ^firefox$, match:title ^Picture-in-Picture$, float on
windowrule = match:class ^firefox$, match:title ^Library$, float on

# Terminal monitors
windowrule = match:class ^kitty$, match:title ^top$, float on
windowrule = match:class ^kitty$, match:title ^btop$, float on
windowrule = match:class ^kitty$, match:title ^htop$, float on

# Media & Settings apps
windowrule = match:class ^vlc$, float on
windowrule = match:class ^kvantummanager$, float on
windowrule = match:class ^qt5ct$, float on
windowrule = match:class ^qt6ct$, float on
windowrule = match:class ^nwg-look$, float on
windowrule = match:class ^org\.kde\.ark$, float on
windowrule = match:class ^org\.pulseaudio\.pavucontrol$, float on
windowrule = match:class ^blueman-manager$, float on
windowrule = match:class ^nm-applet$, float on
windowrule = match:class ^nm-connection-editor$, float on
windowrule = match:class ^org\.kde\.polkit-kde-authentication-agent-1$, float on

# GTK Apps
windowrule = match:class ^Signal$, float on
windowrule = match:class ^com\.github\.rafostar\.Clapper$, float on
windowrule = match:class ^app\.drey\.Warp$, float on
windowrule = match:class ^net\.davidotek\.pupgui2$, float on
windowrule = match:class ^yad$, float on
windowrule = match:class ^eog$, float on
windowrule = match:class ^io\.github\.alainm23\.planify$, float on
windowrule = match:class ^io\.gitlab\.theevilskeleton\.Upscaler$, float on
windowrule = match:class ^com\.github\.unrud\.VideoDownloader$, float on
windowrule = match:class ^io\.gitlab\.adhami3310\.Impression$, float on
windowrule = match:class ^io\.missioncenter\.MissionCenter$, float on

# Telegram
windowrule = match:class ^org\.telegram\.desktop$, float on
windowrule = match:class ^org\.telegram\.desktop$, pin on

# Pavucontrol variants
windowrule = match:class .*pavucontrol.*, float on

# Brave PWAs
windowrule = match:class ^brave-(?!browser)[a-zA-Z0-9-]+-Default$, float on

# Save dialogs
windowrule = match:title .*wants to save.*, float on

# PIP (Picture in Picture)
windowrule = match:title .*Picture.in.(P|p)icture.*, float on
windowrule = match:title .*Picture.in.(P|p)icture.*, pin on
windowrule = match:title .*Picture.in.(P|p)icture.*, keep_aspect_ratio on
windowrule = match:title .*Picture.in.(P|p)icture.*, move onscreen 100% 100%

# Bitwarden & Reminders
windowrule = match:title .*Bitwarden.*, float on
windowrule = match:title .*Reminder.*, float on

# Gimp
windowrule = match:title ^$, match:class ^Gimp.*$, stay_focused on

# Common modals
windowrule = match:title ^Open$, float on
windowrule = match:title ^Choose Files$, float on
windowrule = match:title ^Save As$, float on
windowrule = match:title ^Confirm to replace files$, float on
windowrule = match:title ^File Operation Progress$, float on
windowrule = match:class ^xdg-desktop-portal-hyprland$, float on
windowrule = match:title .*(C|c)alendar.*, float on
windowrule = match:title .*(C|c)alculator.*, float on

# xwaylandvideobridge
windowrule = match:class ^xwaylandvideobridge$, opacity 0.0 override
windowrule = match:class ^xwaylandvideobridge$, no_anim on
windowrule = match:class ^xwaylandvideobridge$, no_initial_focus on
windowrule = match:class ^xwaylandvideobridge$, max_size 1 1
windowrule = match:class ^xwaylandvideobridge$, no_blur on
windowrule = match:class ^xwaylandvideobridge$, no_focus on

# Thunar
windowrule = match:class ^thunar$, match:title ^File Operation Progress$, float on
windowrule = match:class ^thunar$, match:title ^Confirm to replace files$, float on


# Hyprland Gaming Mode Configuration
# This file is sourced dynamically when gamemode is enabled

# Disable blur completely
decoration {
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# Minimal/No animations
animations {
    enabled = false
}

# Performance misc settings
misc {
    vfr = 0
    vrr = 2
    no_direct_scanout = false
}

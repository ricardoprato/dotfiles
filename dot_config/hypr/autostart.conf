# Core services
exec-once = uwsm app -- /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# Notifications & Bar
exec-once = uwsm app -- dunst
# exec-once = uwsm app -- waybar

# Wallpaper & Idle
# exec-once = uwsm app -- hyprpaper
# exec-once = uwsm app -- hypridle

# Device management
exec-once = uwsm app -- udiskie --no-automount --smart-tray
exec-once = uwsm app -- $scrPath/batterynotify.sh

# Network & Bluetooth applets (systray)
exec-once = uwsm app -- nm-applet --indicator
exec-once = uwsm app -- blueman-applet

# Auto DND when screen sharing
exec-once = $scrPath/dnd-screenshare.sh

# Multi-monitor workspace management
exec-once = $scrPath/handle_monitor_connect.sh

# KDE Connect daemon
exec-once = /usr/lib/kdeconnectd

# Default apps
exec-once = [workspace 1 silent] uwsm app -- $term
exec-once = [workspace 2 silent] uwsm app -- $browser
exec-once = [workspace 10 silent] uwsm app -- $mail

include theme.conf

# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size        9.0

# Window
# window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# --- Split navigation (vim-style, smart pass-through to nvim/vim) ---
# Runs kittens/navigate_kitty.py: if the foreground process is nvim/vim,
# writes the raw control byte so the editor handles its own split nav;
# otherwise moves kitty focus to the neighboring window. Mirrors the
# nvim-side helper at ~/.config/nvim/lua/utils/kitty-nav.lua so
# <C-h/j/k/l> works seamlessly across nvim splits AND kitty panes.
map ctrl+h kitten kittens/navigate_kitty.py left   ctrl+h
map ctrl+j kitten kittens/navigate_kitty.py bottom ctrl+j
map ctrl+k kitten kittens/navigate_kitty.py top    ctrl+k
map ctrl+l kitten kittens/navigate_kitty.py right  ctrl+l

# --- Splits create (close kept on kitty default ctrl+shift+w) ---
map ctrl+shift+enter launch --location=hsplit --cwd=current
map ctrl+shift+\     launch --location=vsplit --cwd=current

# --- Zoom / focus active window (kitty side) ---
# Toggles between current layout and `stack` (only active window visible,
# others hidden). nvim has its own zoom on <leader>Z via Snacks.zen.zoom().
map ctrl+shift+z toggle_layout stack

# --- Tab navigation (vim-flavored, Alt-prefixed) ---
map alt+t new_tab_with_cwd
map alt+w close_tab
map alt+h previous_tab
map alt+l next_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# --- Fuzzy folder picker → opens selection in new tab ---
# alt+d for "directory". Overlay-mode: temporary popup that closes on exit.
map alt+d launch --type=overlay --cwd=current kitty-tab-picker

# Allow remote access
# listen_on gives child processes (nvim) a socket to reach kitty via $KITTY_LISTEN_ON.
# Without it, `kitty @ ...` from a non-pty child (e.g. vim.fn.system) fails with
# "open /dev/tty: no such device" and nvim→kitty pane navigation silently drops.
allow_remote_control yes
listen_on unix:@kitty-{kitty_pid}

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# --- Notify when a backgrounded command finishes ---
# Sends a desktop notification (mako) when a command finishes while its window
# isn't visible (other tab, or hidden behind a zoomed stack). Threshold 0 =
# instant: notifies regardless of duration. Bump the 0 to N seconds if noisy.
# Requires shell integration (kept on via shell_integration above).
notify_on_cmd_finish invisible 0.0

# Minimal Tab bar styling
# min_tabs=1 forces the bar to render even with a single tab — otherwise (default 2)
# the tab title, and thus the zoom/splits indicator below, is hidden exactly when
# you have one tab and need to know whether splits/stack are hiding under it.
tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
# 󰊓 marks the tab as zoomed (stack layout) so you remember other splits are hidden.
tab_title_template          {title}{' 󰊓' if layout_name == 'stack' else ''}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

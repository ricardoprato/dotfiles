include theme.conf

# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size        9.0

# Window
# window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# --- Split navigation (vim-style, smart pass-through to nvim/vim) ---
# Runs kittens/navigate_kitty.py: if the foreground process is nvim/vim,
# writes the raw control byte so the editor handles its own split nav;
# otherwise moves kitty focus to the neighboring window. Mirrors the
# nvim-side helper at ~/.config/nvim/lua/utils/kitty-nav.lua so
# <C-h/j/k/l> works seamlessly across nvim splits AND kitty panes.
map ctrl+h kitten kittens/navigate_kitty.py left   ctrl+h
map ctrl+j kitten kittens/navigate_kitty.py bottom ctrl+j
map ctrl+k kitten kittens/navigate_kitty.py top    ctrl+k
map ctrl+l kitten kittens/navigate_kitty.py right  ctrl+l

# --- Splits create (close kept on kitty default ctrl+shift+w) ---
map ctrl+shift+enter launch --location=hsplit --cwd=current
map ctrl+shift+\     launch --location=vsplit --cwd=current

# --- Tab navigation (vim-flavored, Alt-prefixed) ---
map alt+t new_tab_with_cwd
map alt+w close_tab
map alt+h previous_tab
map alt+l next_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# --- Fuzzy folder picker → opens selection in new tab ---
# alt+d for "directory". Overlay-mode: temporary popup that closes on exit.
map alt+d launch --type=overlay --cwd=current kitty-tab-picker

# Allow remote access
allow_remote_control yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
